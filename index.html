0<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Online Portfolio</title>
  <style>
    /* Base layout */
    body{
      margin:0;
      background:#d3d3d3;           /* light gray */
      font-family: Georgia, "Times New Roman", Times, serif;
      color:#111;
      display:flex;
      min-height:100vh;
      align-items:flex-start;
      justify-content:center;
    }
    .wrap{
      width:clamp(320px, 92vw, 760px);
      text-align:center;
      background:transparent;
      padding:28px 18px 42px;
    }

    /* Headings and links */
    h1{
      margin:0 0 6px 0;
      font-size: clamp(28px, 4.5vw, 36px);
      font-weight:700;
      color:#222;
    }
    .name{
      display:inline-block;
      margin:0 0 14px 0;
      font-size: clamp(18px, 3.5vw, 24px);
      color:#1a0dab;               
      text-decoration: none;
      font-weight:600;
    }
    .name:hover{ text-decoration: underline; }

    /* Photo */
    .photo{
      width: 230px;
      height: 230px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #999;
      box-shadow: 0 1px 0 rgba(0,0,0,0.15);
      display:block;
      margin: 10px auto 16px;
      background:#ccc;
    }
    hr{
      border:0;
      border-top:1px solid #a8a8a8;
      margin: 16px 0 14px;
    }
    .links{
      display:flex;
      gap:18px;
      justify-content:center;
      align-items:center;
      margin: 6px 0 14px;
      flex-wrap: wrap;
    }
    a{
      color:#1a0dab;
      text-decoration: underline;
      font-size:18px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    .tagline{
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 18px;
      color:#111;
      margin: 14px 0;
    }
    .muted{ color:#222; }
    .btn{
      margin-top: 12px;
      background:#e6e6e6;
      color:#111;
      border:1px solid #999;
      padding:8px 14px;
      border-radius:4px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 14px;
      cursor:pointer;
    }
    .btn:hover{ background:#ddd; }
    @media (max-width: 420px){
      .photo{ width: 200px; height: 200px; }
      .tagline{ font-size: 16px; }
      a{ font-size:16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>My Online Portfolio</h1>
    <img
      class="photo"
      src="https://image2url.com/r2/default/images/1770554097672-80b8c146-0613-4bcb-916a-455d30b6c3eb.png"
      alt="Portrait of Jun Chen Ek"
  
        

    </div>
    <p class="tagline">
      Photography|Cooking|Badminton|Gaming|Baking
    </p>
    <p class="tagline muted">  
    </p>
    <button class="btn" type="button" onclick="alert('No more info for me,Thats ALL')">
      For more info:
      <a href='/home.htm'>https://mail.google.com/mail/u/0/?hl=en-GB#inboxa>
        <a href='/home.htm'> https://www.instagram.com/nothing.0814_/



    </button>
  </main>
</body>
</html>
